name: Compile Android Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version'
        required: true
        default: '6.1.y'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Prepare kernel config with FULL Android support
        run: |
          mkdir -p compile-kernel/tools/config/stable
          
          # 下载基础配置
          wget -O compile-kernel/tools/config/stable/config-6.1 \
            https://github.com/ophub/kernel/raw/main/kernel-config/release/stable/config-6.1
          
          # 添加完整 Android 支持（关键！）
          cat >> compile-kernel/tools/config/stable/config-6.1 << 'EOFCONFIG'

# ===== Android Full Support =====
CONFIG_ANDROID=y
CONFIG_ASHMEM=y
CONFIG_ANDROID_BINDER_IPC=y
CONFIG_ANDROID_BINDERFS=y
CONFIG_ANDROID_BINDER_DEVICES="binder,hwbinder,vndbinder"
CONFIG_ANDROID_LOW_MEMORY_KILLER=y
CONFIG_ANDROID_LMKD=y
CONFIG_ANDROID_PARANOID_NETWORK=y
CONFIG_ANDROID_INTFS=y
EOFCONFIG
          
          echo "✅ Android config added"
          grep -E "ANDROID|ASHMEM|BINDER" compile-kernel/tools/config/stable/config-6.1 | head -n 10

      - name: Compile the kernel
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          build_target: kernel
          kernel_source: unifreq
          kernel_version: ${{ github.event.inputs.kernel_version }}
          kernel_auto: true
          kernel_sign: -android
          config_flavor: stable
          auto_patch: false

      - name: Upload kernel to Releases
        uses: softprops/action-gh-release@v1
        if: ${{ success() }}
        with:
          tag_name: kernel-${{ env.PACKAGED_OUTPUTTAGS }}-android
          files: ${{ env.PACKAGED_OUTPUTPATH }}/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
